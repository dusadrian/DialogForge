<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DialogR Web</title>
    <link rel="stylesheet" href="/shared/base-app/pages/shared/appCodicon.css">
    <script type="importmap">
        {
            "imports": {
                "preact": "/vendor/preact/preact.module.js",
                "preact/hooks": "/vendor/preact/hooks.module.js"
            }
        }
    </script>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 13px;
            color: #202124;
            background: #f7f8fa;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        .web-app {
            display: grid;
            grid-template-rows: 28px 1fr;
            width: 100%;
            height: 100%;
            min-width: 0;
            min-height: 0;
        }

        .web-menubar {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 2px;
            min-width: 0;
            min-height: 0;
            padding: 3px 8px;
            border-bottom: 1px solid #b9c1cc;
            background: #ffffff;
            box-sizing: border-box;
        }

        .web-menu-root {
            position: relative;
            display: flex;
            align-items: stretch;
        }

        .web-menu-button,
        .web-menu-item {
            border: 0;
            border-radius: 0;
            background: transparent;
            color: #1f2328;
            cursor: default;
            text-align: left;
            white-space: nowrap;
        }

        .web-menu-button {
            min-width: 0;
            height: 24px;
            padding: 0 18px;
            border-radius: 0;
            color: #202124;
            font-size: 14px;
            font-weight: 400;
        }

        .web-menu-button:hover,
        .web-menu-root.is-open > .web-menu-button {
            background: #e8eef7;
            outline: none;
        }

        .web-menu-popup {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            display: none;
            width: max-content;
            min-width: 180px;
            max-width: min(420px, calc(100vw - 24px));
            padding: 6px 0;
            border: 1px solid #b9c1cc;
            border-radius: 0;
            background: #ffffff;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.14);
        }

        .web-menu-root.is-open > .web-menu-popup,
        .web-menu-submenu.is-open > .web-menu-popup {
            display: block;
        }

        .web-menu-submenu {
            position: relative;
        }

        .web-menu-submenu > .web-menu-popup {
            top: -8px;
            left: calc(100% + 4px);
            min-width: max-content;
        }

        .web-menu-separator {
            height: 1px;
            margin: 5px 0;
            background: #d8dee7;
        }

        .web-menu-item {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            width: 100%;
            min-width: max-content;
            min-height: 32px;
            padding: 3px 36px 3px 18px;
            border-radius: 0;
            box-sizing: border-box;
            font-size: 14px;
        }

        .web-menu-item:hover,
        .web-menu-item:focus-visible,
        .web-menu-submenu.is-open > .web-menu-item {
            background: #e8eef7;
            color: #202124;
            outline: none;
        }

        .web-menu-item:disabled {
            color: rgba(31, 35, 40, 0.42);
            background: transparent;
        }

        .web-menu-item__arrow {
            position: absolute;
            right: 15px;
            color: currentColor;
            font-size: 22px;
            line-height: 1;
        }

        .web-desktop {
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, 0.42) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 255, 255, 0.42) 1px, transparent 1px),
                #e8edf4;
            background-size: 28px 28px;
        }

        .web-workbench-window {
            --web-workspace-width: 280px;
            position: absolute;
            left: 18px;
            top: 18px;
            display: grid;
            grid-template-rows: 31px minmax(0, 1fr);
            width: min(1120px, calc(100% - 36px));
            height: min(720px, calc(100% - 36px));
            min-width: 720px;
            min-height: 420px;
            max-width: calc(100% - 36px);
            max-height: calc(100% - 36px);
            border: 1px solid #9ea7b3;
            border-radius: 6px;
            background: #ffffff;
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.2);
            overflow: hidden;
            resize: both;
            box-sizing: border-box;
        }

        .web-workbench-window__titlebar {
            display: flex;
            align-items: center;
            min-width: 0;
            min-height: 0;
            border-bottom: 1px solid #cfd4dc;
            background: #f6f7f9;
            box-sizing: border-box;
            cursor: move;
            user-select: none;
        }

        .web-workbench-window__title {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding: 0 10px;
            color: #2f3742;
            font-weight: 600;
        }

        .web-workbench-window__body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) var(--web-workspace-width);
            min-width: 0;
            min-height: 0;
        }

        .web-workbench-resize-handle {
            position: absolute;
            z-index: 8;
            background: transparent;
            touch-action: none;
        }

        .web-workbench-resize-handle[data-resize-direction="right"] {
            top: 31px;
            right: 0;
            width: 8px;
            bottom: 12px;
            cursor: ew-resize;
        }

        .web-workbench-resize-handle[data-resize-direction="bottom"] {
            left: 0;
            right: 12px;
            bottom: 0;
            height: 8px;
            cursor: ns-resize;
        }

        .web-workbench-resize-handle[data-resize-direction="corner"] {
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
        }

        .web-workbench-resize-handle[data-resize-direction="corner"]::after {
            content: "";
            position: absolute;
            right: 4px;
            bottom: 4px;
            width: 7px;
            height: 7px;
            border-right: 1px solid rgba(47, 55, 66, 0.42);
            border-bottom: 1px solid rgba(47, 55, 66, 0.42);
        }

        #consoleToolbarStart {
            display: none;
        }

        .dm-console-toolbar .dm-toolbar-btn.dm-toolbar-btn-stop {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        body.console-runtime-busy .dm-console-toolbar .dm-toolbar-btn.dm-toolbar-btn-stop {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        body.web-workspace-collapsed .web-workbench-window__body {
            grid-template-columns: minmax(0, 1fr) 0;
        }

        body.web-workspace-collapsed .web-workspace {
            overflow: hidden;
            border-left: 0;
            visibility: hidden;
        }

        .web-workspace {
            min-width: 0;
            min-height: 0;
            overflow: auto;
            background: #ffffff;
        }

        .web-workspace {
            border-left: 1px solid #cfd4dc;
        }

        .web-console {
            --main-command-height: 35%;
            --main-command-min-height: 56px;
            --main-terminal-min-height: 180px;
            --splitter-width: 2px;
            --splitter-color: #b5b5b5;
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            padding: 0;
            background: #ffffff;
            box-sizing: border-box;
        }

        #commandPane {
            flex: 0 0 var(--main-command-height);
            min-height: var(--main-command-min-height);
            position: relative;
            box-sizing: border-box;
        }

        #command {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 6px 74px 6px 8px;
            background: #f8f8f8;
            border-bottom: 1px solid #d0d0d0;
            overflow: auto;
            white-space: pre-wrap;
            font-family: "Dialog Mono", monospace;
            font-size: 13px;
            line-height: 20px;
            font-variant-ligatures: none;
            font-feature-settings: "liga" 0, "calt" 0, "clig" 0, "dlig" 0;
        }

        #command * {
            font-family: inherit;
            font-size: inherit;
            line-height: inherit;
            font-variant-ligatures: inherit;
            font-feature-settings: inherit;
        }

        #commandActions {
            position: absolute;
            top: 6px;
            right: 22px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 90ms ease-out;
            z-index: 4;
        }

        #commandPane:hover #commandActions,
        #commandPane:focus-within #commandActions {
            opacity: 1;
            pointer-events: auto;
        }

        body.command-pane-hidden #commandPane,
        body.command-pane-hidden #mainSplitter {
            display: none;
        }

        .dm-command-action {
            width: 24px;
            height: 24px;
            padding: 0;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.96);
            color: #2f2f2f;
            cursor: pointer;
            box-shadow: none;
        }

        .dm-command-action:hover {
            background: #ececec;
            color: #1f1f1f;
        }

        .dm-command-action:active {
            background: #dfdfdf;
        }

        .dm-command-action:disabled {
            opacity: 0.45;
            cursor: default;
        }

        .dm-command-action .codicon {
            font-size: 15px;
            line-height: 1;
        }

        .dm-command-action::after {
            content: attr(data-tooltip);
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            background: #f5f5f5;
            color: #3a3a3a;
            border: 1px solid #c7c7c7;
            border-radius: 10px;
            padding: 5px 11px;
            font-size: 12px;
            font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, "Noto Sans", "Liberation Sans", sans-serif;
            font-weight: 400;
            line-height: 1.2;
            white-space: nowrap;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: opacity 70ms ease-out;
            transition-delay: 20ms;
            pointer-events: none;
            z-index: 30;
        }

        .dm-command-action:hover::after,
        .dm-command-action:focus-visible::after {
            opacity: 1;
            visibility: visible;
        }

        .copy-icon {
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            color: currentColor;
        }

        .copy-icon::before,
        .copy-icon::after {
            content: "";
            position: absolute;
            width: 10px;
            height: 10px;
            border: 1.3px solid currentColor;
            border-radius: 2.5px;
            background: transparent;
            box-sizing: border-box;
        }

        .copy-icon::before {
            top: 1.5px;
            left: 5px;
        }

        .copy-icon::after {
            top: 4.5px;
            left: 1.5px;
        }

        .splitter {
            flex: 0 0 var(--splitter-width);
            height: var(--splitter-width);
            background: var(--splitter-color);
            cursor: row-resize;
        }

        #consoleArea {
            flex: 1 1 auto;
            min-height: var(--main-terminal-min-height);
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .web-transcript {
            min-width: 0;
            min-height: 0;
            overflow: visible;
            padding: 0;
            font-family: "Dialog Mono", "SFMono-Regular", Consolas, monospace;
            font-size: 13px;
            line-height: 20px;
            white-space: pre-wrap;
            font-variant-ligatures: none;
            font-feature-settings: "liga" 0, "calt" 0, "clig" 0, "dlig" 0;
        }

        .web-transcript__line {
            margin: 0;
        }

        .web-transcript__line--input {
            color: #123f7a;
        }

        .web-transcript__line--stderr {
            color: #9b1c1c;
        }

        .web-command {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 0;
            align-items: start;
            margin: 0;
            padding: 0;
            border: 0;
            background: #ffffff;
            box-sizing: border-box;
        }

        .web-command-editor {
            min-width: 0;
            min-height: 20px;
            max-height: 172px;
            background: #ffffff;
            box-sizing: border-box;
        }

        .web-command-editor .monaco-editor,
        .web-command-editor .monaco-editor-background,
        .web-command-editor .monaco-editor .margin {
            background: #ffffff;
        }

        .web-command-editor .monaco-editor .view-line,
        .web-command-editor .monaco-editor .margin-view-overlays {
            font-variant-ligatures: none;
            font-feature-settings: "liga" 0, "calt" 0, "clig" 0, "dlig" 0;
        }

        .web-command-fallback {
            width: 100%;
            min-height: 20px;
            border: 0;
            outline: none;
            resize: vertical;
            font-family: "Dialog Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
            line-height: 20px;
            caret-color: #111827;
        }

        .container-item-disabled,
        .container-item.disabled,
        .dm-choice-item.disabled {
            color: #7a7a7a;
            cursor: default;
        }

        .container-item-disabled .container-text,
        .container-item.disabled .container-text {
            color: #7a7a7a;
        }

        .consoleTerminal {
            flex: 1 1 auto;
            position: relative;
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            background: #ffffff;
        }

        .consoleToolbar {
            display: flex;
            align-items: center;
            min-width: 0;
            min-height: 29px;
            padding: 2px 6px;
            border-bottom: 1px solid #e1e4e8;
            background: #ffffff;
            box-sizing: border-box;
        }

        .consoleToolbarLeft,
        .consoleToolbarRight {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .consoleToolbarLeft {
            flex: 1 1 auto;
            overflow: hidden;
        }

        .consoleToolbarRight {
            flex: 0 0 auto;
        }

        .dm-console-cwd {
            height: 24px;
            min-width: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
            padding: 0 4px;
            cursor: pointer;
            color: #2f2f2f;
        }

        .dm-console-cwd:hover,
        .dm-toolbar-btn:hover {
            background: #e4e4e4;
        }

        .dm-console-cwd-text {
            display: inline-block;
            max-width: 260px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            vertical-align: bottom;
        }

        .dm-toolbar-btn {
            width: 24px;
            height: 24px;
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: #1f2328;
            cursor: pointer;
            padding: 0;
        }

        .dm-toolbar-btn:disabled,
        .dm-console-cwd:disabled {
            color: #9aa4b2;
            cursor: default;
            opacity: 0.55;
        }

        .dm-console-active-dataset,
        .dm-console-state-chip {
            flex: 0 1 auto;
            min-width: 0;
            max-width: 180px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 20px;
            box-sizing: border-box;
            padding: 0 7px;
            border: 1px solid rgba(47, 125, 79, 0.28);
            border-radius: 4px;
            background: rgba(47, 125, 79, 0.08);
            color: #245f3d;
            font-size: 11px;
            line-height: 1;
        }

        .dm-console-active-dataset[hidden],
        .dm-console-state-chip[hidden] {
            display: none;
        }

        .dm-console-active-dataset-name,
        .dm-console-state-chip-value {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 700;
        }

        #consoleProductStateChips {
            display: contents;
        }

        .commandInput {
            min-height: 20px;
            height: 20px;
            max-height: 172px;
            border: 0;
            outline: none;
            background: #ffffff;
            color: #1f1f1f;
            font-family: "Dialog Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 13px;
            line-height: 20px;
            font-variant-ligatures: none;
            font-feature-settings: "liga" 0, "calt" 0, "clig" 0, "dlig" 0;
            padding: 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            caret-color: #111827;
        }

        .commandInput .monaco-editor,
        .commandInput .monaco-editor-background,
        .commandInput .monaco-editor .margin {
            background: #ffffff;
        }

        .commandInput .monaco-editor .view-line,
        .commandInput .monaco-editor .margin-view-overlays {
            font-variant-ligatures: none;
            font-feature-settings: "liga" 0, "calt" 0, "clig" 0, "dlig" 0;
        }

        .console-context-menu {
            position: absolute;
            z-index: 20;
            min-width: 120px;
            padding: 4px;
            border: 1px solid #c7c7c7;
            border-radius: 4px;
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
        }

        .console-context-menu[hidden] {
            display: none;
        }

        .console-context-menu-item {
            display: block;
            width: 100%;
            min-height: 24px;
            border: 0;
            border-radius: 3px;
            background: transparent;
            text-align: left;
            cursor: pointer;
        }

        .console-context-menu-item:hover,
        .console-context-menu-item:focus-visible {
            background: #e8f0fe;
        }

        .web-workspace__content {
            height: 100%;
            min-height: 0;
        }

        .workspace-pane-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            position: relative;
        }

        .workspace-pane-header {
            height: 29px;
            flex: 0 0 29px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            box-sizing: border-box;
            padding: 0 8px;
            border-bottom: 1px solid #d2d2d2;
            background: #f3f3f3;
        }

        .workspace-pane-title {
            color: #2d2d2d;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            font-weight: 600;
            line-height: 1;
        }

        .workspace-pane-actions {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 0;
        }

        .workspace-pane-action {
            position: relative;
            width: 24px;
            height: 24px;
            padding: 0;
            border: 0;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: #2f2f2f;
            cursor: pointer;
            box-shadow: none;
            margin: 0 1px;
            line-height: 1;
            vertical-align: middle;
        }

        .workspace-pane-action:hover {
            background: #e4e4e4;
        }

        .workspace-pane-action:active {
            background: #d6d6d6;
        }

        .workspace-pane-action:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .workspace-pane-action .workspace-pane-action-icon {
            width: 15px;
            height: 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            user-select: none;
        }

        .workspace-pane-action .workspace-broom-icon {
            width: 100%;
            height: 100%;
            display: block;
            overflow: visible;
        }

        .workspace-pane-action .workspace-broom-icon path {
            fill: none;
            stroke: currentColor;
            stroke-width: 0.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-miterlimit: 5;
            vector-effect: non-scaling-stroke;
        }

        .workspace-pane-body {
            flex: 1 1 auto;
            min-height: 0;
            overflow: auto;
            padding: 10px 10px 14px 10px;
        }

        .workspace-pane-empty {
            padding: 18px 10px;
            color: #7a7a7a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            line-height: 1.4;
        }

        .workspace-group {
            margin-bottom: 10px;
        }

        .workspace-group-header {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #f7f7f7;
            color: #454545;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
        }

        .workspace-group-chevron {
            width: 18px;
            color: #707070;
            text-align: center;
            font-size: 17px;
            line-height: 1;
        }

        .workspace-group-title {
            flex: 1 1 auto;
            min-width: 0;
        }

        .workspace-group-count {
            color: #7a7a7a;
            font-weight: 500;
        }

        .workspace-group-items {
            margin-top: 6px;
        }

        .workspace-variable-row {
            position: relative;
        }

        .workspace-variable-row + .workspace-variable-row {
            margin-top: 6px;
        }

        .workspace-variable-row.recent .workspace-variable {
            background: #eff8f2;
            border-color: rgba(52, 141, 88, 0.22);
        }

        .workspace-variable-row.active-dataset .workspace-variable {
            background: #edf7f0;
            border-color: rgba(47, 125, 79, 0.46);
        }

        .workspace-variable-row.active-dataset .workspace-variable:hover {
            background: rgba(47, 125, 79, 0.14);
            border-color: rgba(47, 125, 79, 0.58);
        }

        .workspace-variable {
            width: 100%;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
            box-sizing: border-box;

            left: 0;
            text-align: center !important;
            white-space: nowrap;
        }

        .dialogforge-web-value-labels-window .ds-labels-table thead .ds-labels-table__value {
            padding-left: 5px;
        }

        .dialogforge-web-value-labels-window .ds-labels-table thead .ds-labels-table__label {
            padding-left: 7px;
        }

        .dialogforge-web-value-labels-window .ds-labels-table__value {
            width: 118px;
            min-width: 118px;
            max-width: 118px;
        }

        .dialogforge-web-value-labels-window .ds-labels-table__label {
            width: 260px;
            min-width: 260px;
        }

        .dialogforge-web-value-labels-window .ds-labels-table__actions {
            width: 24px;
            min-width: 24px;
            max-width: 24px;
            text-align: center;
        }

        .dialogforge-web-value-labels-window .ds-labels-table__input {
            width: 100%;
            height: 26px;
            box-sizing: border-box;
            padding: 3px 8px;
            border: 1px solid #d6dde7;
            border-radius: 6px;
            background: #fff;
            color: #1f2b3c;
            font: inherit;
        }

        .dialogforge-web-value-labels-window .ds-labels-table__input:focus {
            outline: none;
            border-color: #7bb798;
            box-shadow: 0 0 0 2px rgba(123, 183, 152, 0.18);
        }

        .dialogforge-web-value-labels-window .ds-labels-delete {
            width: 26px;
            height: 26px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            line-height: 1;
            padding: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .dialogforge-web-value-labels-window .ds-labels-delete:hover {
            border-color: rgba(0, 0, 0, 0.35);
            background: rgba(236, 88, 88, 0.14);
        }

        .dialogforge-web-value-labels-window .ds-labels-drag {
            width: 8px;
            height: 22px;
            border: none;
            background: transparent;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
        }

        .dialogforge-web-value-labels-window .ds-labels-drag::before {
            content: '';
            width: 6px;
            height: 15px;
            background-image:
                radial-gradient(circle, #26714d 58%, transparent 60%),
                radial-gradient(circle, #26714d 58%, transparent 60%),
                radial-gradient(circle, #26714d 58%, transparent 60%);
            background-size: 4px 4px;
            background-repeat: no-repeat;
            background-position: center 0.5px, center 5.5px, center 10.5px;
        }

        .dialogforge-web-value-labels-range {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 13px 0 2px 24px;
            font-size: 0.9rem;
        }

        .dialogforge-web-value-labels-range__toggle {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #1f2b3c;
        }

        .dialogforge-web-value-labels-window .ds-labels-range-input {
            width: 75px;
        }

        .dialogforge-web-value-labels-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            padding: 10px 14px 12px;
            border-top: 1px solid #d7d7d7;
            background: #f7f7f7;
        }

        .dialogforge-web-value-labels-action {
            min-width: 92px;
            height: 30px;
            border: 1px solid #b8b8b8;
            border-radius: 4px;
            background: #eeeeee;
            color: #111;
            font: inherit;
            cursor: pointer;
        }

        .dialogforge-web-value-labels-action--primary {
            border-color: #9ea7b2;
            background: #e8eef7;
        }

        .dialogforge-web-script-editor-window {
            width: min(980px, calc(100vw - 48px));
            height: min(620px, calc(100vh - 48px));
            min-width: 640px;
            min-height: 360px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            resize: both;
        }

        .dialogforge-web-script-editor-window .dialogforge-web-dialog__titlebar {
            flex: 0 0 32px;
        }

        .web-script-editor {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            background: #ececec;
            color: #1f1f1f;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 13px;
        }

        .web-script-editor .dm-script-toolbar {
            height: 34px;
            flex: 0 0 34px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 8px;
            border-bottom: 1px solid #d2d2d2;
            background: #f3f3f3;
            box-sizing: border-box;
        }

        .web-script-editor .dm-divider {
            width: 1px;
            height: 16px;
            background: #dadada;
            margin: 0 2px;
        }

        .web-script-editor .dm-script-btn {
            height: 24px;
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: #2f2f2f;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 6px;
            font-size: 12px;
            font: inherit;
            position: relative;
        }

        .web-script-editor .dm-script-btn:hover {
            background: #e4e4e4;
        }

        .web-script-editor .dm-script-btn.icon-only {
            width: 24px;
            justify-content: center;
            padding: 0;
        }

        .web-script-editor .dm-script-tabs {
            flex: 0 0 30px;
            display: flex;
            align-items: stretch;
            gap: 0;
            overflow-x: auto;
            overflow-y: hidden;
            border-bottom: 1px solid #dcdcdc;
            background: #efefef;
            box-sizing: border-box;
        }

        .web-script-editor .dm-script-tab {
            min-width: 120px;
            max-width: 260px;
            height: 29px;
            border: 0;
            border-right: 1px solid #d6d6d6;
            background: #efefef;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 10px;
            color: #2f2f2f;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, 'Noto Sans', 'Liberation Sans', sans-serif;
            box-sizing: border-box;
        }

        .web-script-editor .dm-script-tab.active {
            background: #f8f8f8;
        }

        .web-script-editor .dm-script-tab-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1 1 auto;
            text-align: left;
        }

        .web-script-editor .dm-script-tab-close {
            border: 0;
            background: transparent;
            color: #616161;
            width: 18px;
            height: 18px;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex: 0 0 auto;
            font-size: 13px;
            line-height: 1;
        }

        .web-script-editor .dm-script-tab-close:hover {
            background: #e5e5e5;
            color: #2f2f2f;
        }

        .web-script-editor .dm-script-pathbar {
            flex: 0 0 28px;
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-bottom: 1px solid #d7d7d7;
            background: #f8f8f8;
            color: #666;
            font-size: 12px;
            box-sizing: border-box;
        }

        .web-script-editor__monaco {
            flex: 1 1 auto;
            min-height: 0;
            background: #ffffff;
        }
    </style>
</head>
<body class="command-pane-hidden">
    <div class="web-app">
        <nav class="web-menubar" id="webMenuBar" aria-label="Application menu"></nav>
        <main class="web-desktop" id="webDesktop">
            <section class="web-workbench-window" id="webWorkbenchWindow" role="dialog" aria-label="DialogR console and workspace">
                <header class="web-workbench-window__titlebar">
                    <div class="web-workbench-window__title">WebR console</div>
                </header>
                <div class="web-workbench-window__body">
                    <section class="web-console">
                        <div id="commandPane">
                            <div id="commandActions" aria-label="Command preview actions">
                                <button
                                    type="button"
                                    id="commandPreviewToConsole"
                                    class="dm-command-action"
                                    data-tooltip="Copy to Console"
                                    aria-label="Copy to Console"
                                >
                                    <span class="copy-icon" aria-hidden="true"></span>
                                </button>
                                <button
                                    type="button"
                                    id="commandPreviewToScriptEditor"
                                    class="dm-command-action"
                                    data-tooltip="Send to Script Editor"
                                    aria-label="Send to Script Editor"
                                >
                                    <span class="codicon codicon-insert" aria-hidden="true"></span>
                                </button>
                            </div>
                            <div id="command"></div>
                        </div>
                        <div
                            class="splitter"
                            id="mainSplitter"
                            role="separator"
                            aria-orientation="horizontal"
                            tabindex="0"
                        ></div>
                        <div id="consoleArea">
                            <div class="consoleToolbar dm-console-toolbar" id="consoleToolbar" aria-label="Console toolbar">
                                <div class="consoleToolbarLeft dm-console-toolbar-left">
                                    <button class="dm-console-cwd" id="consoleCwd" type="button" data-tooltip="Set working directory" aria-label="Set working directory">
                                        <span class="codicon codicon-folder" aria-hidden="true"></span>
                                        <span class="dm-console-cwd-text" id="consoleCwdText"></span>
                                    </button>
                                    <span class="dm-console-active-dataset" id="consoleActiveDataset" hidden>
                                        <span class="dm-console-active-dataset-label" id="consoleActiveDatasetLabel">Active:</span>
                                        <span class="dm-console-active-dataset-name" id="consoleActiveDatasetName"></span>
                                    </span>
                                    <span id="consoleProductStateChips"></span>
                                </div>
                                <div class="consoleToolbarRight dm-console-toolbar-right">
                                    <button class="dm-toolbar-btn" id="consoleToolbarStart" type="button" data-tooltip="Start runtime" aria-label="Start runtime">Start</button>
                                    <button class="dm-toolbar-btn dm-toolbar-btn-stop" id="consoleToolbarStop" type="button" data-tooltip="Interrupt" aria-label="Interrupt">
                                        <span class="dm-stop-square" aria-hidden="true"></span>
                                    </button>
                                    <button class="dm-toolbar-btn" id="consoleToolbarRestart" type="button" data-tooltip="Restart Clean" aria-label="Restart Clean">
                                        <span class="dm-toolbar-svg-icon dm-toolbar-svg-icon-restart" aria-hidden="true"></span>
                                    </button>
                                    <button class="dm-toolbar-btn" id="consoleToolbarRestartWorkspace" type="button" data-tooltip="Restart and Restore Workspace" aria-label="Restart and Restore Workspace">
                                        <span class="dm-toolbar-svg-icon dm-toolbar-svg-icon-restartworkspace" aria-hidden="true"></span>
                                    </button>
                                    <button class="dm-toolbar-btn" id="consoleToolbarInfo" type="button" data-tooltip="Info" aria-label="Info">
                                        <span class="codicon codicon-info" aria-hidden="true"></span>
                                    </button>
                                    <button class="dm-toolbar-btn" id="consoleToolbarClear" type="button" data-tooltip="Clear Console" aria-label="Clear Console">
                                        <span class="codicon codicon-clear-all" aria-hidden="true"></span>
                                    </button>
                                    <button class="dm-toolbar-btn" id="workspacePaneToggle" type="button" data-tooltip="Toggle Workspace" aria-label="Toggle Workspace">
                                        <span class="codicon codicon-chevron-left" aria-hidden="true"></span>
                                    </button>
                                </div>
                            </div>
                            <div class="consoleTerminal" id="consoleTerminal" aria-live="polite"></div>
                            <div
                                class="commandInput"
                                id="visibleCommandInput"
                                role="textbox"
                                aria-multiline="true"
                                contenteditable="true"
                                spellcheck="false"
                            ></div>
                        </div>
                    </section>
                    <aside class="web-workspace">
                        <div class="web-workspace__content" id="workspaceSummary">No objects in workspace</div>
                    </aside>
                </div>
                <span class="web-workbench-resize-handle" data-resize-direction="right" aria-hidden="true"></span>
                <span class="web-workbench-resize-handle" data-resize-direction="bottom" aria-hidden="true"></span>
                <span class="web-workbench-resize-handle" data-resize-direction="corner" aria-hidden="true"></span>
            </section>
        </main>
    </div>
    <script type="module" src="/shared/shell-web/pages/dialogr.js"></script>
</body>
</html>
