<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./shared/dmTheme.css">
  <script src="./shared/dmControls.js"></script>
  <script>require('./dialogRuntimeRequirements.js');</script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #f4f4f4;
    }
    .root {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 14px;
      background: #fff;
      border: 1px solid #d7d7d7;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    dm-select, input {
      height: 30px;
      padding: 3px 6px;
      box-sizing: border-box;
    }
    .help {
      color: #666;
    }
    .actions {
      margin-top: auto;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
    button {
      height: 30px;
      min-width: 78px;
    }
  </style>
</head>
<body>
  <div class="root">
    <h1 id="title">Dialog Runtime Requirements</h1>
    <div class="field">
      <label id="labelDialog" for="dialogSelect">Dialog</label>
      <dm-select id="dialogSelect"></dm-select>
    </div>
    <div class="field">
      <label id="labelPackages" for="rPackages">R packages</label>
      <input id="rPackages" type="text" placeholder="car; dplyr">
    </div>
    <div id="help" class="help"></div>
    <div class="actions">
      <button id="saveBtn" type="button">Save</button>
      <button id="closeBtn" type="button">Close</button>
    </div>
  </div>
</body>
</html>
