<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./shared/dmTheme.css">
  <link rel="stylesheet" href="./shared/appCodicon.css">
  <script src="./shared/dmControls.js"></script>
  <script>require('./menuCustomize.js');</script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
    }
    .root {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 12px;
      background: #fff;
    }
    .pane {
      border: 1px solid #ccc;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .pane-head {
      padding: 8px 10px;
      border-bottom: 1px solid #ddd;
      font-weight: 600;
      background: #fafafa;
    }
    .tree-actions, .prop-actions, .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 8px 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    .tree-wrap {
      padding: 8px 10px;
      overflow: auto;
      flex: 1;
      min-height: 0;
      background: #fff;
    }
    .tree {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .tree__item {
      display: block;
      line-height: 1.4;
      padding: 2px 0;
      border-radius: 4px;
      cursor: default;
      user-select: none;
    }
    .tree__row {
      display: flex;
      align-items: center;
      gap: 6px;
      position: relative;
    }
    .tree__row::before {
      content: '';
      position: absolute;
      left: 12px;
      right: 0;
      top: -1px;
      bottom: -1px;
      background: transparent;
      pointer-events: none;
      z-index: 0;
    }
    .tree__row > * {
      position: relative;
      z-index: 1;
    }
    .tree__row:hover::before {
      background: #e8f0ff;
    }
    .tree__item.is-selected > .tree__row::before {
      background: #cfe3ff;
    }
    .tree__group {
      list-style: none;
      margin: 0;
      padding-left: 16px;
      position: relative;
    }
    .tree__group > .tree__item {
      position: relative;
      padding-left: 16px;
    }
    .tree__group > .tree__item::before {
      content: '';
      position: absolute;
      top: 11px;
      left: -8px;
      width: 30px;
      border-top: 1.5px dashed rgba(0, 0, 0, 0.3);
    }
    .tree__group > .tree__item::after {
      content: '';
      position: absolute;
      top: -13px;
      bottom: 14px;
      left: -10px;
      border-left: 1.5px dashed rgba(0, 0, 0, 0.3);
    }
    .tree__group > .tree__item:last-child::after {
      height: calc(1.1em + 8px);
    }
    .tree__disclosure {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      color: #555;
      cursor: pointer;
      flex: 0 0 18px;
      position: relative;
      top: -1px;
    }
    .tree__drag-handle {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 11px;
      line-height: 1;
      cursor: grab;
      user-select: none;
      flex: 0 0 14px;
    }
    .tree__drag-handle:active {
      cursor: grabbing;
    }
    .tree__disclosure::before {
      content: '\25B6';
      font-size: 0.9rem;
      line-height: 1;
    }
    [aria-expanded="true"] > .tree__row > .tree__disclosure::before {
      content: '\25BC';
    }
    .tree__disclosure.is-leaf::before {
      content: '';
    }
    .tree__label {
      cursor: pointer;
      min-width: 0;
      flex: 1 1 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111 !important;
    }
    .tree__row:hover .tree__label,
    .tree__item:hover .tree__label,
    .tree__item.is-selected .tree__label,
    .tree__item[aria-selected="true"] .tree__label {
      color: #111 !important;
    }
    .tree__row.is-drop-target::before {
      background: #b9dbff;
    }
    .tree__row.drop-before {
      box-shadow: inset 0 2px 0 #2f6fdd;
    }
    .tree__row.drop-after {
      box-shadow: inset 0 -2px 0 #2f6fdd;
    }
    .tree__row.drop-inside::before {
      background: #9fd0ff;
    }
    .tree__item.is-dragging {
      opacity: 0.5;
    }
    .props {
      padding: 10px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .field {
      display: grid;
      gap: 4px;
    }
    .field-inline {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      align-items: center;
    }
    label {
      color: #222;
    }
    input, select, textarea, button {
      font-size: 13px;
      font-family: inherit;
    }
    input, select, textarea {
      box-sizing: border-box;
      width: 100%;
      padding: 5px 6px;
    }
    textarea {
      min-height: 56px;
      resize: vertical;
    }
    button {
      height: 30px;
      min-width: 86px;
    }
    .icon-btn {
      min-width: 29px;
      width: 29px;
      height: 26px;
      line-height: 20px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      border-radius: 4px;
    }
    .icon-btn .file-icon {
      width: 13px;
      height: 16px;
      display: block;
      pointer-events: none;
    }
    .icon-btn .file-icon path {
      fill: #fff;
      stroke: #111;
      stroke-width: 2;
      stroke-linejoin: miter;
    }
    .icon-btn .glyph {
      font-size: 0.85rem;
      line-height: 1;
      color: #111;
      pointer-events: none;
      user-select: none;
    }
    .icon-btn.sep-btn {
      min-width: 50px;
      width: 50px;
    }
    .icon-btn.sep-btn .glyph {
      font-size: 16px;
      letter-spacing: 0.02em;
      display: inline-block;
      width: 26px;
      overflow: hidden;
      text-align: center;
      white-space: nowrap;
    }
    .icon-btn.add-menu-btn .glyph {
      font-size: 0.9rem;
      position: relative;
      top: 1px;
    }
    .icon-btn.arrow-btn .glyph {
      font-size: 0.85rem;
      font-weight: 400;
      line-height: 1;
    }
    .icon-btn .arrow-icon {
      width: 14px;
      height: 14px;
      display: block;
      pointer-events: none;
    }
    .icon-btn .arrow-icon path {
      stroke: #111;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .icon-btn .codicon {
      font-size: 16px;
      line-height: 1;
      color: #111;
      pointer-events: none;
      user-select: none;
    }
    .icon-btn.remove-btn .codicon {
      font-size: 17px;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .footer {
      grid-column: 1 / -1;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    .hint {
      color: #777;
      padding: 0 10px 8px 10px;
    }
  </style>
</head>
<body>
  <div class="root">
    <div class="pane">
      <div id="paneHeadStructure" class="pane-head">Menu Structure</div>
      <div class="tree-actions">
        <button id="addTopMenu" class="icon-btn add-menu-btn" type="button" title="Add Menu" aria-label="Add Menu">
          <span class="glyph" aria-hidden="true">▶</span>
          <span id="srAddMenu" class="sr-only">Add Menu</span>
        </button>
        <button id="addDialogItem" class="icon-btn" type="button" title="Add Dialog Item" aria-label="Add Dialog Item">
          <svg class="file-icon" viewBox="0 0 24 28" aria-hidden="true" focusable="false">
            <path d="M3 1h12l6 6v20H3z"></path>
            <path d="M15 1v6h6"></path>
          </svg>
          <span id="srAddDialogItem" class="sr-only">Add Dialog Item</span>
        </button>
        <button id="addSeparator" class="icon-btn sep-btn" type="button" title="Add Separator" aria-label="Add Separator">
          <span class="glyph" aria-hidden="true">───</span>
          <span id="srAddSeparator" class="sr-only">Add Separator</span>
        </button>
        <button id="removeNode" class="icon-btn remove-btn" type="button" title="Remove" aria-label="Remove">
          <span class="codicon codicon-trash" aria-hidden="true"></span>
          <span id="srRemove" class="sr-only">Remove</span>
        </button>
        <button id="moveUp" class="icon-btn arrow-btn" type="button" title="Move Up" aria-label="Move Up">
          <svg class="arrow-icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M10 17 V4"></path>
            <path d="M5.5 8.5 L10 4 L14.5 8.5"></path>
          </svg>
          <span id="srMoveUp" class="sr-only">Move Up</span>
        </button>
        <button id="moveDown" class="icon-btn arrow-btn" type="button" title="Move Down" aria-label="Move Down">
          <svg class="arrow-icon" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <path d="M10 3 V16"></path>
            <path d="M5.5 11.5 L10 16 L14.5 11.5"></path>
          </svg>
          <span id="srMoveDown" class="sr-only">Move Down</span>
        </button>
      </div>
      <div id="hintRenameNode" class="hint">Double-click a node to rename it.</div>
      <div class="tree-wrap" id="treeWrap"></div>
    </div>

    <div class="pane">
      <div id="paneHeadProperties" class="pane-head">Properties</div>
      <div class="props">
        <div class="field">
          <label id="labelPropLabel" for="propLabel">Label</label>
          <input id="propLabel" type="text" />
        </div>
        <div class="field">
          <label id="labelPropDialogFile" for="propDialogFile">Dialog File</label>
          <div class="field-inline">
            <input id="propDialogFile" type="text" readonly placeholder="No file selected" />
            <button id="browseDialog" type="button">Browse...</button>
          </div>
        </div>
        <div class="field">
          <label id="labelPropRuntimeProvider" for="propRuntimeProvider">Runtime Provider</label>
          <input id="propRuntimeProvider" type="text" placeholder="blank" aria-required="true" />
        </div>
        <div class="field">
          <label id="labelPropShortcut" for="propShortcut">Shortcut</label>
          <input id="propShortcut" type="text" placeholder="e.g. CmdOrCtrl+Shift+R" />
        </div>
        <div class="field">
          <label id="labelPropDependencies" for="propDependencies">Dependencies (packages)</label>
          <input id="propDependencies" type="text" placeholder="pkg1, pkg2" />
        </div>
        <div class="field">
          <label id="labelPropIcon" for="propIcon">Icon (optional path)</label>
          <input id="propIcon" type="text" />
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-actions">
        <button id="saveMenu" type="button">Save</button>
        <button id="cancelMenu" type="button">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
