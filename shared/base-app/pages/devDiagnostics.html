<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta
        http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';"
    >
    <title>Developer Diagnostics</title>
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px;
            color: #20242a;
            background: #f4f5f7;
        }

        body {
            margin: 0;
        }

        .shell {
            padding: 14px;
            display: grid;
            gap: 14px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 16px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }

        .panel {
            border: 1px solid #d7dbe2;
            border-radius: 4px;
            background: #ffffff;
            padding: 12px;
            min-width: 0;
        }

        button {
            border: 1px solid #cbd1da;
            border-radius: 4px;
            background: #ffffff;
            padding: 5px 10px;
            font: inherit;
            cursor: pointer;
        }

        pre,
        ul {
            margin: 0;
        }

        pre {
            overflow: auto;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }

        ul {
            padding-left: 18px;
        }

        li {
            margin: 4px 0;
            overflow-wrap: anywhere;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="toolbar">
            <h1>Developer Diagnostics</h1>
            <button id="refresh" type="button">Refresh</button>
        </div>
        <div class="grid">
            <section class="panel">
                <h2>Runtime Session</h2>
                <pre id="runtimeSession">Loading...</pre>
            </section>
            <section class="panel">
                <h2>Runtime Events</h2>
                <pre id="runtimeEvents">Loading...</pre>
            </section>
            <section class="panel">
                <h2>Runtime Prompts</h2>
                <pre id="runtimePrompts">Loading...</pre>
            </section>
            <section class="panel">
                <h2>Workspace</h2>
                <pre id="workspace">Loading...</pre>
            </section>
            <section class="panel">
                <h2>Settings</h2>
                <pre id="settings">Loading...</pre>
            </section>
            <section class="panel">
                <h2>Composition</h2>
                <pre id="composition">Loading...</pre>
            </section>
        </div>
    </div>
    <script>
        (function() {
            const write = function(id, value) {
                document.getElementById(id).textContent = JSON.stringify(value, null, 4);
            };

            const refresh = async function() {
                write("runtimeSession", await window.dialogForge.getRuntimeSession());
                write("runtimeEvents", await window.dialogForge.listRuntimeEvents());
                write("runtimePrompts", await window.dialogForge.listPrompts());
                write("workspace", await window.dialogForge.refreshWorkspace());
                write("settings", await window.dialogForge.readSettings());
                write("composition", await window.dialogForge.getComposition());
            };

            document.getElementById("refresh").addEventListener("click", refresh);
            window.dialogForge.onRuntimeSession(function(snapshot) {
                write("runtimeSession", snapshot);
            });
            window.dialogForge.onRuntimeEvents(function(snapshot) {
                write("runtimeEvents", snapshot);
            });
            window.dialogForge.onWorkspace(function(snapshot) {
                write("workspace", snapshot);
            });
            refresh();
        })();
    </script>
</body>
</html>
